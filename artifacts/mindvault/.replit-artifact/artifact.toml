kind = "web"
previewPath = "/"
title = "MindVault"
version = "1.0.0"
id = "artifacts/mindvault"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18174

[services.development]
run = "pnpm --filter @workspace/mindvault run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mindvault", "run", "build" ]
publicDir = "artifacts/mindvault/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18174"
BASE_PATH = "/"
